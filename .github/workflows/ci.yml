name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SUPABASE_POOLER_URL: postgresql://postgres:postgres@localhost:5432/postgres
      OLLAMA_HOST: http://localhost:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      EMBED_DIM: "768"
      MEMORY_ROOTS: ./docs;./
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit transitive glob (deprecation guard)
        run: |
          set -e
          DEPRECATED=$(npm ls glob --all --json 2>/dev/null | node -e "
            let raw = '';
            process.stdin.on('data', c => raw += c);
            process.stdin.on('end', () => {
              try {
                const tree = JSON.parse(raw);
                const found = [];
                const walk = (n, path) => {
                  if (!n) return;
                  if (n.name === 'glob' && n.version && n.version.startsWith('10.')) {
                    found.push(path + ' -> glob@' + n.version);
                  }
                  const deps = n.dependencies || {};
                  for (const k of Object.keys(deps)) walk(deps[k], path + ' > ' + k);
                };
                walk(tree, tree.name || 'root');
                if (found.length) {
                  console.log('FOUND_DEPRECATED');
                  found.forEach(f => console.log(f));
                } else {
                  console.log('OK_NO_GLOB_10');
                }
              } catch (e) {
                console.log('OK_NO_GLOB_10');
              }
            });
          ")
          echo "$DEPRECATED"
          echo "$DEPRECATED" | grep -q "FOUND_DEPRECATED" && exit 1 || exit 0

      - name: Lint module boundaries
        run: npx tsx scripts/lint-boundaries.ts

      - name: TypeScript compile
        run: npx tsc

      - name: Provision database schema (pgvector + extensions schema + roles)
        env:
          PGPASSWORD: postgres
        run: |
          if ! command -v psql >/dev/null 2>&1; then sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client; fi
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f scripts/ci-provision.sql
          npx tsx scripts/apply-schema.ts

      - name: Run regression test suite
        run: npm test

      - name: Verify dist/ build artifacts
        run: |
          test -f dist/index.js
          test -f dist/config.js
          test -d dist/tools

      - name: Pack tarball (FTUX simulation)
        run: |
          npm pack --dry-run
          npm pack
          TARBALL=$(ls smart-claude-memory-mcp-*.tgz | head -1)
          echo "Built tarball: $TARBALL"
          tar -tzf "$TARBALL" | grep -E "scripts/.*\.sql$" | wc -l | xargs -I {} test {} -ge 20

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Verify package.json version is publishable
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $VERSION"
          if [ -z "$VERSION" ]; then exit 1; fi
